<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié - Blog CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px;
      max-width: 450px;
      width: 100%;
    }
    h1 { color: #333; margin-bottom: 8px; font-size: 28px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 15px; line-height: 1.5; }
    .form-group { margin-bottom: 24px; }
    label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .message.error { background: #fee; color: #c33; }
    .message.success { background: #efe; color: #3a3; }
    .message.show { display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mot de passe oublié</h1>
    <p class="subtitle">Entrez votre adresse email. Si un compte existe, vous recevrez un lien de réinitialisation.</p>

    <div id="message" class="message"></div>

    <form id="forgotForm" onsubmit="handleForgot(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="votre@email.com">
      </div>
      <button type="submit" id="submitBtn">Envoyer le lien</button>
    </form>

    <a href="/admin/login.html" class="back-link">Retour à la connexion</a>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';

    async function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      btn.disabled = true;
      btn.textContent = 'Envoi...';
      msg.className = 'message';

      try {
        const response = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'Erreur');

        msg.textContent = data.message;
        msg.className = 'message success show';
        document.getElementById('forgotForm').style.display = 'none';
      } catch (error) {
        msg.textContent = error.message;
        msg.className = 'message error show';
        btn.disabled = false;
        btn.textContent = 'Envoyer le lien';
      }
    }
  </script>
</body>
</html>
