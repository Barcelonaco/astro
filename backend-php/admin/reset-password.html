<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe - Blog CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px;
      max-width: 450px;
      width: 100%;
    }
    h1 { color: #333; margin-bottom: 8px; font-size: 28px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 15px; }
    .form-group { margin-bottom: 24px; }
    label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 48px; }
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      transition: color 0.2s, background 0.2s;
    }
    .password-toggle:hover {
      color: #667eea;
      background: #f0f4ff;
      transform: translateY(-50%);
      box-shadow: none;
    }
    .password-toggle:active { transform: translateY(-50%); }
    .password-toggle svg { width: 20px; height: 20px; }
    .password-toggle .icon-hide { display: none; }
    .password-toggle.is-visible .icon-show { display: none; }
    .password-toggle.is-visible .icon-hide { display: block; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .message.error { background: #fee; color: #c33; }
    .message.success { background: #efe; color: #3a3; }
    .message.show { display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nouveau mot de passe</h1>
    <p class="subtitle">Choisissez votre nouveau mot de passe.</p>

    <div id="message" class="message"></div>

    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="form-group">
        <label for="password">Nouveau mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="password" required minlength="6" placeholder="Minimum 6 caractères">
          <button type="button" class="password-toggle" data-target="password" aria-label="Afficher le mot de passe" aria-pressed="false">
            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirmer le mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="confirm" required minlength="6">
          <button type="button" class="password-toggle" data-target="confirm" aria-label="Afficher le mot de passe" aria-pressed="false">
            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" id="submitBtn">Changer le mot de passe</button>
    </form>

    <a href="/login" class="back-link">Retour à la connexion</a>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    const token = new URLSearchParams(window.location.search).get('token');

    document.querySelectorAll('.password-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.classList.toggle('is-visible', isHidden);
        btn.setAttribute('aria-pressed', String(isHidden));
        btn.setAttribute('aria-label', isHidden ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      });
    });

    if (!token) {
      document.getElementById('message').textContent = 'Lien invalide. Veuillez refaire une demande.';
      document.getElementById('message').className = 'message error show';
      document.getElementById('resetForm').style.display = 'none';
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        msg.textContent = 'Les mots de passe ne correspondent pas.';
        msg.className = 'message error show';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Mise à jour...';
      msg.className = 'message';

      try {
        const response = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'Erreur');

        msg.textContent = 'Mot de passe mis à jour ! Redirection...';
        msg.className = 'message success show';
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => window.location.href = '/login', 2000);
      } catch (error) {
        msg.textContent = error.message;
        msg.className = 'message error show';
        btn.disabled = false;
        btn.textContent = 'Changer le mot de passe';
      }
    }
  </script>
</body>
</html>
