<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Blog CMS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px;
      max-width: 450px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 8px;
      font-size: 32px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      transition: color 0.2s, background 0.2s;
    }

    .password-toggle:hover {
      color: #667eea;
      background: #f0f4ff;
      transform: translateY(-50%);
      box-shadow: none;
    }

    .password-toggle:active {
      transform: translateY(-50%);
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
    }

    .password-toggle .icon-hide {
      display: none;
    }

    .password-toggle.is-visible .icon-show {
      display: none;
    }

    .password-toggle.is-visible .icon-hide {
      display: block;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .warning {
      background: #fff8e1;
      color: #b8860b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .warning.show {
      display: block;
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 14px;
      color: #555;
    }

    .info strong {
      display: block;
      margin-bottom: 8px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Connexion</h1>
    <p class="subtitle">Accédez à votre tableau de bord</p>

    <div id="inactivityMessage" class="warning"></div>
    <div id="errorMessage" class="error"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login">Email ou nom d'utilisateur</label>
        <input type="text" id="login" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="password" required autocomplete="current-password">
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Afficher le mot de passe" aria-pressed="false">
            <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="loginBtn">Se connecter</button>
    </form>

    <p style="text-align:center;margin-top:16px;">
      <a href="/admin/forgot-password.html" style="color:#667eea;text-decoration:none;font-size:14px;">Mot de passe oublié ?</a>
    </p>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/admin/';
    }

    // Toggle password visibility
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    passwordToggle.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      passwordToggle.classList.toggle('is-visible', isHidden);
      passwordToggle.setAttribute('aria-pressed', String(isHidden));
      passwordToggle.setAttribute('aria-label', isHidden ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
    });

    // Show inactivity message if redirected for that reason
    if (new URLSearchParams(window.location.search).get('reason') === 'inactivity') {
      const msg = document.getElementById('inactivityMessage');
      msg.textContent = 'Vous avez été déconnecté après 1 heure d\'inactivité.';
      msg.classList.add('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMessage');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Connexion...';
      errorDiv.classList.remove('show');

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            login: document.getElementById('login').value,
            password: document.getElementById('password').value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Échec de la connexion');
        }

        localStorage.setItem('token', data.token);
        window.location.href = '/admin/';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
