<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Blog CMS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px;
      max-width: 450px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 8px;
      font-size: 32px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .info {
      margin-top: 24px;
      padding: 16px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 14px;
      color: #555;
    }

    .info strong {
      display: block;
      margin-bottom: 8px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Connexion</h1>
    <p class="subtitle">Accédez à votre tableau de bord</p>

    <div id="errorMessage" class="error"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" value="admin@example.com">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password" value="admin123">
      </div>

      <button type="submit" id="loginBtn">Se connecter</button>
    </form>

    <div class="info">
      <strong>Identifiants par défaut :</strong>
      Email: admin@example.com<br>
      Mot de passe: admin123
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/admin/';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMessage');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Connexion...';
      errorDiv.classList.remove('show');

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Échec de la connexion');
        }

        localStorage.setItem('token', data.token);
        window.location.href = '/admin/';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
