<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/admin/">
  <title>Admin - Blog CMS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="nickl-app-admin.css">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <span class="logo-icon"><i class="fa-solid fa-rocket"></i></span>
        <h2>Astro Builder</h2>
        <p class="user-info" id="userInfo">Chargement...</p>
      </div>
      <nav class="nav">
        <a href="#" class="nav-item active" data-section="dashboard"><i class="fa-solid fa-table-columns"></i><span>Tableau de bord</span></a>
        <a href="#" class="nav-item" data-section="pages"><i class="fa-regular fa-file-lines"></i><span>Pages</span></a>
        <a href="#" class="nav-item" data-section="reusable-blocs"><i class="fa-regular fa-clone"></i><span>Blocs réutilisables</span></a>
        <a href="#" class="nav-item" data-section="menus"><i class="fa-solid fa-bars"></i><span>Menus</span></a>
        <a href="#" class="nav-item admin-only" data-section="forms" style="display:none"><i class="fa-regular fa-rectangle-list"></i><span>Formulaires</span></a>
        <a href="#" class="nav-item" data-section="media"><i class="fa-regular fa-images"></i><span>Médiathèque</span></a>
        <a href="#" class="nav-item" data-section="site-settings"><i class="fa-solid fa-gear"></i><span>Paramètres du site</span></a>
        <a href="#" class="nav-item admin-only" data-section="theme" style="display:none"><i class="fa-solid fa-palette"></i><span>Thème</span></a>
        <a href="#" class="nav-item admin-only" data-section="plugins" style="display:none"><i class="fa-solid fa-plug"></i><span>Plugins</span></a>
        <a href="#" class="nav-item admin-only" data-section="ai-credits" style="display:none"><i class="fa-solid fa-microchip"></i><span>Crédits IA</span></a>
        <a href="#" class="nav-item" data-section="users" id="navUsers" style="display:none"><i class="fa-solid fa-users"></i><span>Utilisateurs</span></a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logout()" class="btn btn-logout">Déconnexion</button>
      </div>
    </aside>

    <!-- Sidebar Toggle -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Replier/Déplier la sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="11 17 6 12 11 7"></polyline>
        <polyline points="18 17 13 12 18 7"></polyline>
      </svg>
    </button>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content" id="content">
        <!-- Content will be loaded here -->
      </div>
    </main>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText"></div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="app.js?v=20260408b"></script>
</body>
</html>
