name: Deploy to production atempora.bcnco.site

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-atempora
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, zip, pdo_mysql
          coverage: none

      - name: Install backend PHP deps
        working-directory: ./backend-php
        run: composer install --no-dev --optimize-autoloader

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ATEMPORA_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend-php
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='uploads/' \
            ./backend-php/ ${{ secrets.ATEMPORA_SSH_USER }}@${{ secrets.ATEMPORA_SSH_HOST }}:~/atempora.bcnco.site/httpdocs/backend-php/

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='dist/' \
            --exclude='node_modules/' \
            ./frontend/ ${{ secrets.ATEMPORA_SSH_USER }}@${{ secrets.ATEMPORA_SSH_HOST }}:~/atempora.bcnco.site/httpdocs/frontend/

      - name: Deploy root package.json
        run: |
          rsync -avz \
            ./package.json ${{ secrets.ATEMPORA_SSH_USER }}@${{ secrets.ATEMPORA_SSH_HOST }}:~/atempora.bcnco.site/httpdocs/

      - name: Deploy plugins
        run: |
          rsync -avz --delete \
            ./plugins/ ${{ secrets.ATEMPORA_SSH_USER }}@${{ secrets.ATEMPORA_SSH_HOST }}:~/atempora.bcnco.site/httpdocs/plugins/

      - name: Post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ATEMPORA_SSH_HOST }}
          username: ${{ secrets.ATEMPORA_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            REMOTE_ROOT=~/atempora.bcnco.site/httpdocs

            # Use PHP 8.x from Plesk (default php is 7.4)
            PHP=$(ls /opt/plesk/php/8.*/bin/php 2>/dev/null | sort -V | tail -1 || echo php)
            echo "Using PHP: $PHP ($($PHP -v | head -1))"

            cd "$REMOTE_ROOT"
            npm i

            # Migrate database (safe to re-run, never drops data)
            cd "$REMOTE_ROOT/backend-php"
            $PHP migrate.php

            # Start temporary PHP server for build-time API access (port 8892 to avoid collision with other sites)
            $PHP -S 127.0.0.1:8892 index.php > /dev/null 2>&1 &
            PHP_PID=$!

            # Wait until PHP server is ready (max 15s)
            for i in $(seq 1 15); do
              curl -sf http://127.0.0.1:8894/api/settings/site > /dev/null 2>&1 && break
              echo "Waiting for PHP server... ($i)"
              sleep 1
            done

            cd "$REMOTE_ROOT/frontend"
            npm i

            # Backup dist before build (astro build wipes dist/ first)
            if [ -d dist ]; then cp -r dist dist_backup; fi

            if BUILD_API_URL=http://127.0.0.1:8894/api BUILD_SITE_URL=https://atempora.bcnco.site BUILD_MEDIA_ORIGIN=https://atempora.bcnco.site npm run build; then
              rm -rf dist_backup
            else
              echo "Build failed, restoring previous dist"
              if [ -d dist_backup ]; then rm -rf dist; mv dist_backup dist; fi
              kill $PHP_PID 2>/dev/null || true
              exit 1
            fi

            kill $PHP_PID 2>/dev/null || true

            ln -sfn "$REMOTE_ROOT/frontend/dist" "$REMOTE_ROOT/backend-php/dist"
            echo "✅ Déploiement atempora.bcnco.site terminé"
