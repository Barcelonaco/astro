name: Deploy to Production astro.bcnco.site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, zip, pdo_mysql
          coverage: none

      - name: Install backend PHP deps
        working-directory: ./backend-php
        run: composer install --no-dev --optimize-autoloader

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ASTRO_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend-php
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='uploads/' \
            ./backend-php/ ${{ secrets.ASTRO_SSH_USER }}@${{ secrets.ASTRO_SSH_HOST }}:~/astro.bcnco.site/httpdocs/backend-php/

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='dist/' \
            --exclude='node_modules/' \
            ./frontend/ ${{ secrets.ASTRO_SSH_USER }}@${{ secrets.ASTRO_SSH_HOST }}:~/astro.bcnco.site/httpdocs/frontend/

      - name: Post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ASTRO_SSH_HOST }}
          username: ${{ secrets.ASTRO_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            REMOTE_ROOT=~/astro.bcnco.site/httpdocs
            ln -sfn "$REMOTE_ROOT/frontend/dist" "$REMOTE_ROOT/backend-php/dist"
            echo "✅ Déploiement astro.bcnco.site terminé"
