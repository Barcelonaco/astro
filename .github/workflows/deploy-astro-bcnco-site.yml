name: Deploy to Production astro.bcnco.site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du repo (dans le runner GitHub)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Installer Node & PHP (Composer)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # LTS

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, zip
          coverage: none

      - name: Install backend deps (Composer)
        working-directory: ./backend-php
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy via SSH (rsync)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ASTRO_SSH_HOST }} # 162.19.56.20
          username: ${{ secrets.ASTRO_SSH_USER }} # bcnco
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            REMOTE_ROOT=~/astro.bcnco.site/httpdocs

            # Crée le répertoire s’il n’existe pas
            mkdir -p "$REMOTE_ROOT"

            # 1️⃣ Pull du dépôt distant (si le repo existe déjà sur le serveur)
            if [ -d "$REMOTE_ROOT/.git" ]; then
              cd "$REMOTE_ROOT"
              git fetch origin main
              git merge --ff-only origin/main || true   # garde les fichiers locaux non‑versionnés
            else
              # Si le repo n’est pas encore présent, le cloner
              git clone https://github.com/Barcelonaco/astro.git "$REMOTE_ROOT"
            fi

            # 2️⃣ Sauvegarder les .env existants (s’ils existent)
            [ -f "$REMOTE_ROOT/backend-php/.env" ] && cp -f "$REMOTE_ROOT/backend-php/.env" /tmp/backend-php.env || true
            [ -f "$REMOTE_ROOT/frontend/.env" ] && cp -f "$REMOTE_ROOT/frontend/.env" /tmp/frontend.env || true

            # 3️⃣ Copier les nouvelles dépendances et le build
            rsync -avz --delete ./backend-php/ "$REMOTE_ROOT/backend-php/"
            rsync -avz --delete ./frontend/dist/ "$REMOTE_ROOT/frontend/dist/"

            # 4️⃣ Restaurer les .env si on les avait sauvegardés
            [ -f /tmp/backend-php.env ] && cp -f /tmp/backend-php.env "$REMOTE_ROOT/backend-php/.env" || true
            [ -f /tmp/frontend.env ] && cp -f /tmp/frontend.env "$REMOTE_ROOT/frontend/.env" || true

            # 5️⃣ (Optionnel) forcer le bon .env du frontend
            echo "PUBLIC_API_URL=https://astro.bcnco.site/api" > "$REMOTE_ROOT/frontend/.env"

            # 6️⃣ Créer le lien symbolique attendu par le backend (si nécessaire)
            ln -sfn "../frontend/dist" "$REMOTE_ROOT/backend-php/dist"

            echo "✅ Déploiement astro.bcnco.site terminé"
