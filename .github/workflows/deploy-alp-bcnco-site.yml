name: Deploy to production alp.bcnco.site

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  extensions: mbstring, intl, zip, pdo_mysql
                  coverage: none

            - name: Install backend PHP deps
              working-directory: ./backend-php
              run: composer install --no-dev --optimize-autoloader

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.ALP_SSH_HOST }} >> ~/.ssh/known_hosts

            - name: Deploy backend-php
              run: |
                  rsync -avz --delete \
                    --exclude='.env' \
                    --exclude='dist' \
                    --exclude='uploads/' \
                    ./backend-php/ ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/backend-php/

            - name: Deploy frontend
              run: |
                  rsync -avz --delete \
                    --exclude='.env' \
                    --exclude='dist/' \
                    --exclude='node_modules/' \
                    ./frontend/ ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/frontend/

            - name: Deploy root package.json
              run: |
                  rsync -avz \
                    ./package.json ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/

            - name: Deploy plugins
              run: |
                  rsync -avz --delete \
                    ./plugins/ ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/plugins/

            - name: Post-deploy
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.ALP_SSH_HOST }}
                  username: ${{ secrets.ALP_SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      set -e
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
                      REMOTE_ROOT=~/alp.bcnco.site/httpdocs

                      # Use PHP 8.x from Plesk (default php is 7.4)
                      PHP=$(ls /opt/plesk/php/8.*/bin/php 2>/dev/null | sort -V | tail -1 || echo php)
                      echo "Using PHP: $PHP ($($PHP -v | head -1))"

                      cd "$REMOTE_ROOT"
                      npm i

                      # Migrate database (safe to re-run, never drops data)
                      cd "$REMOTE_ROOT/backend-php"
                      $PHP migrate.php

                      # Start temporary PHP server for build-time API access
                      $PHP -S 127.0.0.1:8888 index.php > /dev/null 2>&1 &
                      PHP_PID=$!
                      sleep 2

                      cd "$REMOTE_ROOT/frontend"
                      npm i
                      BUILD_API_URL=http://127.0.0.1:8888/api npm run build

                      kill $PHP_PID 2>/dev/null || true

                      ln -sfn "$REMOTE_ROOT/frontend/dist" "$REMOTE_ROOT/backend-php/dist"
                      echo "✅ Déploiement alp.bcnco.site terminé"
