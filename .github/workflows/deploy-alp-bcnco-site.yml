name: Deploy to Production alp.bcnco.site

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            # 1️⃣ Checkout du code
            - name: Checkout repository
              uses: actions/checkout@v4

            # 2️⃣ Installer Node & Composer (PHP)
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20" # version LTS

            - name: Install frontend dependencies
              working-directory: ./frontend
              run: npm ci

            - name: Build frontend
              working-directory: ./frontend
              run: npm run build

            # 3️⃣ Installer PHP dependencies (Composer)
            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  extensions: mbstring, intl, zip
                  coverage: none

            - name: Install backend dependencies
              working-directory: ./backend-php
              run: composer install --no-dev --optimize-autoloader

            # 4️⃣ Deploy via SSH (simple rsync)
            - name: Deploy via SSH (rsync)
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.ALP_SSH_HOST }} # 162.19.56.20
                  username: ${{ secrets.ALP_SSH_USER }} # bcnco
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  # Crée le répertoire httpdocs s’il n’existe pas, puis synchronise
                  script: |
                      set -e
                      REMOTE_ROOT=~/alp.bcnco.site/httpdocs
                      mkdir -p "$REMOTE_ROOT"

                      # Nettoyer le répertoire (optionnel, à faire avec précaution)
                      # rm -rf "$REMOTE_ROOT"/*

                      # Copie du backend
                      rsync -avz --delete ./backend-php/ "$REMOTE_ROOT/backend-php/"

                      # Copie du frontend build
                      rsync -avz --delete ./frontend/dist/ "$REMOTE_ROOT/frontend/dist/"

                      # (Optionnel) créer un lien symbolique si votre backend attend /dist
                      # ln -sfn "$REMOTE_ROOT/frontend/dist" "$REMOTE_ROOT/backend-php/dist"

                      echo "✅ Déploiement terminé sur $REMOTE_ROOT"
