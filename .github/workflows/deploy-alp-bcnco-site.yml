name: Deploy to Production alp.bcnco.site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, zip, pdo_mysql
          coverage: none

      - name: Install backend PHP deps
        working-directory: ./backend-php
        run: composer install --no-dev --optimize-autoloader

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ALP_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend-php
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='uploads/' \
            ./backend-php/ ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/backend-php/

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='dist/' \
            --exclude='node_modules/' \
            ./frontend/ ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/frontend/

      - name: Deploy root package.json
        run: |
          rsync -avz \
            ./package.json ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/

      - name: Deploy plugins
        run: |
          rsync -avz --delete \
            ./plugins/ ${{ secrets.ALP_SSH_USER }}@${{ secrets.ALP_SSH_HOST }}:~/alp.bcnco.site/httpdocs/plugins/

      - name: Post-deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALP_SSH_HOST }}
          username: ${{ secrets.ALP_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            REMOTE_ROOT=~/alp.bcnco.site/httpdocs

            cd "$REMOTE_ROOT"
            npm i

            cd "$REMOTE_ROOT/frontend"
            npm i
            npm run build

            ln -sfn "$REMOTE_ROOT/frontend/dist" "$REMOTE_ROOT/backend-php/dist"
            echo "✅ Déploiement alp.bcnco.site terminé"
