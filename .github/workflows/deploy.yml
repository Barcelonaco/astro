name: Deploy

on:
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      site:
        description: Site to deploy
        type: choice
        options:
          - all
          - alp
          - astro
          - atempora
          - audition-confiance
          - masaiges
          - darcy-prod
          - poolp
        default: all

concurrency:
  group: deploy-${{ github.event.inputs.site || 'all' }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          SITE='${{ github.event.inputs.site }}'
          if [ -z "$SITE" ] || [ "$SITE" = "all" ]; then
            echo 'matrix=["alp","astro","atempora","audition-confiance","masaiges","darcy-prod","poolp"]' >> $GITHUB_OUTPUT
          else
            echo "matrix=[\"$SITE\"]" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        site: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: ${{ matrix.site == 'poolp' && 'recursive' || 'false' }}
          token: ${{ matrix.site == 'poolp' && secrets.POOLP_PLUGIN_TOKEN || github.token }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, zip, pdo_mysql
          coverage: none

      - name: Install backend PHP deps
        working-directory: ./backend-php
        run: composer install --no-dev --optimize-autoloader

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Resolve site config
        id: cfg
        run: |
          SITE='${{ matrix.site }}'
          UPPER=$(echo "$SITE" | tr 'a-z-' 'A-Z_')
          echo "upper=$UPPER" >> $GITHUB_OUTPUT
          echo "url=${SITE}.bcnco.site" >> $GITHUB_OUTPUT

      - name: Deploy backend-php
        run: |
          sshpass -p "${{ secrets[format('{0}_SSH_PASS', steps.cfg.outputs.upper)] }}" \
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='uploads/' \
            ./backend-php/ \
            ${{ secrets[format('{0}_SSH_USER', steps.cfg.outputs.upper)] }}@${{ secrets[format('{0}_SSH_HOST', steps.cfg.outputs.upper)] }}:${{ secrets[format('{0}_SSH_PATH', steps.cfg.outputs.upper)] }}/backend-php/

      - name: Deploy frontend
        run: |
          sshpass -p "${{ secrets[format('{0}_SSH_PASS', steps.cfg.outputs.upper)] }}" \
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='dist/' \
            --exclude='node_modules/' \
            ./frontend/ \
            ${{ secrets[format('{0}_SSH_USER', steps.cfg.outputs.upper)] }}@${{ secrets[format('{0}_SSH_HOST', steps.cfg.outputs.upper)] }}:${{ secrets[format('{0}_SSH_PATH', steps.cfg.outputs.upper)] }}/frontend/

      - name: Deploy root package.json
        run: |
          sshpass -p "${{ secrets[format('{0}_SSH_PASS', steps.cfg.outputs.upper)] }}" \
          rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./package.json \
            ${{ secrets[format('{0}_SSH_USER', steps.cfg.outputs.upper)] }}@${{ secrets[format('{0}_SSH_HOST', steps.cfg.outputs.upper)] }}:${{ secrets[format('{0}_SSH_PATH', steps.cfg.outputs.upper)] }}/

      - name: Deploy plugins
        run: |
          sshpass -p "${{ secrets[format('{0}_SSH_PASS', steps.cfg.outputs.upper)] }}" \
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./plugins/ \
            ${{ secrets[format('{0}_SSH_USER', steps.cfg.outputs.upper)] }}@${{ secrets[format('{0}_SSH_HOST', steps.cfg.outputs.upper)] }}:${{ secrets[format('{0}_SSH_PATH', steps.cfg.outputs.upper)] }}/plugins/

      - name: Post-deploy
        run: |
          sshpass -p "${{ secrets[format('{0}_SSH_PASS', steps.cfg.outputs.upper)] }}" \
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets[format('{0}_SSH_USER', steps.cfg.outputs.upper)] }}@${{ secrets[format('{0}_SSH_HOST', steps.cfg.outputs.upper)] }} \
            bash -s << 'DEPLOY_SCRIPT'
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          REMOTE_ROOT="${{ secrets[format('{0}_SSH_PATH', steps.cfg.outputs.upper)] }}"
          URL="${{ steps.cfg.outputs.url }}"

          PHP=$(ls /opt/plesk/php/8.*/bin/php 2>/dev/null | sort -V | tail -1 || echo php)
          echo "Using PHP: $PHP ($($PHP -v | head -1))"

          cd "$REMOTE_ROOT"
          npm i

          cd "$REMOTE_ROOT/backend-php"
          $PHP migrate.php

          PORT=$($PHP -r '$s=stream_socket_server("tcp://127.0.0.1:0");$n=stream_socket_get_name($s,false);echo (int)substr(strrchr($n,":"),1);fclose($s);')
          echo "Using PHP server port: $PORT"

          $PHP -S 127.0.0.1:$PORT index.php > /dev/null 2>&1 &
          PHP_PID=$!
          trap 'kill $PHP_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:$PORT/api/settings/site > /dev/null 2>&1 && break
            echo "Waiting for PHP server... ($i)"
            sleep 1
          done

          cd "$REMOTE_ROOT/frontend"
          npm i

          if [ -d dist ]; then cp -r dist dist_backup; fi

          if BUILD_API_URL=http://127.0.0.1:$PORT/api BUILD_SITE_URL=https://${URL} BUILD_MEDIA_ORIGIN=https://${URL} npm run build; then
            rm -rf dist_backup
          else
            echo "Build failed, restoring previous dist"
            if [ -d dist_backup ]; then rm -rf dist; mv dist_backup dist; fi
            exit 1
          fi

          ln -sfn "$REMOTE_ROOT/frontend/dist" "$REMOTE_ROOT/backend-php/dist"
          echo "Deploy ${URL} done"
          DEPLOY_SCRIPT
