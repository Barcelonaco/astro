name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 162.19.56.20
          username: bcnco
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/astro.bcnco.site/httpdocs

            # Pull les derniers changements
            git pull origin main

            # Install dépendances frontend et build
            cd frontend && npm install && npm run build && cd ..

            # Install dépendances PHP (si nécessaire)
            cd backend-php && composer install --no-dev --optimize-autoloader 2>/dev/null; cd ..
