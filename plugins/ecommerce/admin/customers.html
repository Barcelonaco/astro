<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Clients</title>
  <link rel="stylesheet" href="/admin/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/ecommerce.css">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/customers.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="content">
  <div class="page-header">
    <div>
      <h1>Clients</h1>
      <p class="page-subtitle">Gestion des comptes clients, statut pro et remises.</p>
    </div>
    <div id="customers-stats" class="stats-bar"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar" id="customers-tabs" style="margin-bottom:16px;display:flex;gap:0;border-bottom:2px solid var(--gray-200,#e5e7eb)">
    <button class="tab-btn active" data-tab="active" style="padding:10px 20px;border:none;background:none;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px">Clients actifs</button>
    <button class="tab-btn" data-tab="deleted" style="padding:10px 20px;border:none;background:none;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--gray-500,#6b7280)">Comptes supprimés</button>
  </div>

  <!-- Filters -->
  <div class="card filters-card" id="customers-filters">
    <div class="filters-row">
      <input type="text" class="form-input" id="filter-q" placeholder="Recherche (email, nom, entreprise, SIRET...)" style="max-width:300px">
      <select class="form-select" id="filter-pro-status" style="max-width:180px">
        <option value="">Tous les statuts</option>
        <option value="none">Particulier</option>
        <option value="pending">Pro en attente</option>
        <option value="approved">Pro approuvé</option>
        <option value="rejected">Pro refusé</option>
      </select>
    </div>
  </div>

  <div id="customers-loading" class="card" style="text-align:center;color:var(--gray-500)">Chargement...</div>

  <div class="card" id="customers-table-card" style="display:none">
    <table class="customers-table">
      <thead>
        <tr>
          <th class="sortable" data-sort="id">ID</th>
          <th class="sortable" data-sort="last_name">Client</th>
          <th class="sortable" data-sort="email">Email</th>
          <th class="sortable" data-sort="company">Entreprise</th>
          <th class="sortable" data-sort="pro_status">Statut pro</th>
          <th class="sortable" data-sort="discount_rate">Remise</th>
          <th class="sortable" data-sort="order_count">Commandes</th>
          <th class="sortable" data-sort="total_spent_cents">CA Payé</th>
          <th class="sortable" data-sort="created_at">Inscription</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="customers-tbody"></tbody>
    </table>
    <div class="pagination" id="customers-pagination"></div>
  </div>

  <div id="customers-empty" class="card empty" style="display:none">
    <p>Aucun client trouvé.</p>
  </div>
</div>

<template id="customer-row-tpl">
  <tr>
    <td class="cell-id" style="font-family:monospace;font-size:11px;color:var(--gray-500)"></td>
    <td class="cell-name"></td>
    <td class="cell-email"></td>
    <td class="cell-company"></td>
    <td class="cell-pro-status"></td>
    <td class="cell-discount"></td>
    <td class="cell-orders"></td>
    <td class="cell-revenue"></td>
    <td class="cell-date"></td>
    <td>
      <div class="row-actions" style="display:flex;gap:4px;justify-content:flex-end">
        <button class="icon-btn" data-view title="Voir la fiche">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="icon-btn" data-delete title="Supprimer" style="color:#b91c1c">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </td>
  </tr>
</template>

<script type="module" src="./customers/main.js"></script>
</body>
</html>
