<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Commandes</title>
  <link rel="stylesheet" href="/admin/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/ecommerce.css">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/orders.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="content">
  <div class="page-header">
    <div>
      <h1>Commandes</h1>
      <p class="page-subtitle">Suivi, statut et remboursement des commandes clients.</p>
    </div>
    <div id="orders-stats" class="stats-bar"></div>
  </div>

  <!-- Filters -->
  <div class="card filters-card" id="orders-filters">
    <div class="filters-row">
      <input type="text" class="form-input" id="filter-q" placeholder="Recherche (n° commande, email...)" style="max-width:260px">
      <select class="form-select" id="filter-status" style="max-width:180px">
        <option value="">Tous les statuts</option>
        <option value="awaiting_payment">En attente paiement</option>
        <option value="paid">Payée</option>
        <option value="processing">En traitement</option>
        <option value="shipped">Expediée</option>
        <option value="delivered">Livrée</option>
        <option value="cancelled">Annulée</option>
        <option value="refunded">Remboursée</option>
      </select>
      <select class="form-select" id="filter-payment" style="max-width:180px">
        <option value="">Tous les paiements</option>
        <option value="unpaid">Non Payé</option>
        <option value="pending">En attente</option>
        <option value="paid">Payé</option>
        <option value="failed">Echoué</option>
        <option value="refunded">Remboursé</option>
        <option value="partially_refunded">Partiel remboursé</option>
      </select>
      <input type="date" class="form-input" id="filter-date-from" style="max-width:160px" title="Date debut">
      <input type="date" class="form-input" id="filter-date-to" style="max-width:160px" title="Date fin">
    </div>
  </div>

  <div id="orders-loading" class="card" style="text-align:center;color:var(--gray-500)">Chargement...</div>

  <div class="card" id="orders-table-card" style="display:none">
    <table class="orders-table">
      <thead>
        <tr>
          <th>Commande</th>
          <th>Client</th>
          <th>Statut</th>
          <th>Paiement</th>
          <th>Methode</th>
          <th>Total</th>
          <th>Date</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="orders-tbody"></tbody>
    </table>
    <div class="pagination" id="orders-pagination"></div>
  </div>

  <div id="orders-empty" class="card empty" style="display:none">
    <p>Aucune commande trouvee.</p>
  </div>
</div>

<template id="order-row-tpl">
  <tr>
    <td><span class="cell-number"></span></td>
    <td class="cell-client"></td>
    <td class="cell-status"></td>
    <td class="cell-payment"></td>
    <td class="cell-method"></td>
    <td class="cell-total"></td>
    <td class="cell-date"></td>
    <td>
      <div class="row-actions">
        <button class="icon-btn" data-view title="Voir le detail">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="icon-btn danger" data-delete title="Supprimer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </td>
  </tr>
</template>

<script type="module" src="./orders/main.js"></script>
</body>
</html>
