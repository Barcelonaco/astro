<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Factures</title>
  <link rel="stylesheet" href="/admin/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/ecommerce.css">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/invoices.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="content">
  <div class="page-header">
    <div>
      <h1>Factures</h1>
      <p class="page-subtitle">Consultation et telechargement des factures et avoirs.</p>
    </div>
    <div>
      <button class="btn btn-primary" id="btn-generate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Generer une facture
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="card filters-card" id="invoices-filters">
    <div class="filters-row">
      <input type="text" class="form-input" id="filter-q" placeholder="Recherche (n° facture, commande, email...)" style="max-width:300px">
      <select class="form-select" id="filter-type" style="max-width:180px">
        <option value="">Tous les types</option>
        <option value="invoice">Facture</option>
        <option value="credit_note">Avoir</option>
      </select>
    </div>
  </div>

  <div id="invoices-loading" class="card" style="text-align:center;color:var(--gray-500)">Chargement...</div>

  <div class="card" id="invoices-table-card" style="display:none">
    <table class="invoices-table">
      <thead>
        <tr>
          <th>N° Facture</th>
          <th>Type</th>
          <th>Commande</th>
          <th>Email</th>
          <th>Montant TTC</th>
          <th>Date</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="invoices-tbody"></tbody>
    </table>
    <div class="pagination" id="invoices-pagination"></div>
  </div>

  <div id="invoices-empty" class="card empty" style="display:none">
    <p>Aucune facture trouvee.</p>
  </div>
</div>

<template id="invoice-row-tpl">
  <tr>
    <td><span class="cell-number"></span></td>
    <td class="cell-type"></td>
    <td><span class="cell-order"></span></td>
    <td class="cell-email"></td>
    <td class="cell-amount"></td>
    <td class="cell-date"></td>
    <td>
      <div class="row-actions">
        <a class="icon-btn" data-download title="Telecharger le PDF" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>
      </div>
    </td>
  </tr>
</template>

<script type="module">
import { api, apiGet, apiPost, API_BASE } from './_lib/api.js';
import { qs, qsa, cloneTpl, delegate, escape } from './_lib/dom.js';
import { toastSuccess, toastError, toastInfo, modalForm, withErrorToast } from './_lib/swal.js';

const Swal = window.Swal;

// ── State ───────────────────────────────────────────────────────────────────
let currentPage = 1;
const perPage = 20;

// ── Helpers ─────────────────────────────────────────────────────────────────
function formatPrice(cents) {
  if (cents == null) return '-';
  return (cents / 100).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' EUR';
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function typeLabel(type) {
  if (type === 'credit_note') return '<span class="invoice-badge avoir">Avoir</span>';
  return '<span class="invoice-badge facture">Facture</span>';
}

// ── Filters ─────────────────────────────────────────────────────────────────
function collectFilters() {
  return {
    q: qs('#filter-q').value.trim(),
    type: qs('#filter-type').value,
  };
}

let debounceTimer = null;
function reloadFiltered(page) {
  currentPage = page || 1;
  loadInvoices();
}

qs('#filter-q').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => reloadFiltered(1), 300);
});
qs('#filter-type').addEventListener('change', () => reloadFiltered(1));

// ── Load invoices ───────────────────────────────────────────────────────────
async function loadInvoices() {
  const filters = collectFilters();
  const params = new URLSearchParams();
  params.set('page', currentPage);
  params.set('per_page', perPage);
  if (filters.q) params.set('q', filters.q);
  if (filters.type) params.set('type', filters.type);

  qs('#invoices-loading').style.display = '';
  qs('#invoices-table-card').style.display = 'none';
  qs('#invoices-empty').style.display = 'none';

  try {
    const res = await apiGet('/admin/invoices?' + params.toString());
    const invoices = res.data || res.invoices || res || [];
    const total = res.total ?? invoices.length;
    const totalPages = res.totalPages ?? Math.ceil(total / perPage);

    qs('#invoices-loading').style.display = 'none';

    if (!invoices.length) {
      qs('#invoices-empty').style.display = '';
      return;
    }

    renderTable(invoices);
    renderPagination(totalPages);
    qs('#invoices-table-card').style.display = '';
  } catch (err) {
    console.error(err);
    qs('#invoices-loading').style.display = 'none';
    qs('#invoices-empty').style.display = '';
    toastError(err?.message || 'Erreur de chargement');
  }
}

// ── Render table ────────────────────────────────────────────────────────────
function renderTable(invoices) {
  const tbody = qs('#invoices-tbody');
  tbody.innerHTML = '';

  for (const inv of invoices) {
    const frag = cloneTpl('invoice-row-tpl');
    const tr = frag.querySelector('tr');

    tr.querySelector('.cell-number').textContent = inv.invoice_number || '-';
    tr.querySelector('.cell-type').innerHTML = typeLabel(inv.type);
    tr.querySelector('.cell-order').textContent = inv.order_number || '-';
    tr.querySelector('.cell-email').textContent = inv.email || '-';
    tr.querySelector('.cell-amount').textContent = formatPrice(inv.total_cents);
    tr.querySelector('.cell-date').textContent = formatDate(inv.created_at || inv.date);

    const downloadLink = tr.querySelector('[data-download]');
    const adminToken = (window.parent && window.parent.localStorage ? window.parent.localStorage : localStorage).getItem('token') || '';
    downloadLink.href = API_BASE + '/admin/invoices/' + inv.id + '/pdf?token=' + encodeURIComponent(adminToken);

    tbody.appendChild(frag);
  }
}

// ── Pagination ──────────────────────────────────────────────────────────────
function renderPagination(totalPages) {
  const container = qs('#invoices-pagination');
  container.innerHTML = '';

  if (totalPages <= 1) return;

  const prevBtn = document.createElement('button');
  prevBtn.textContent = 'Prec.';
  prevBtn.disabled = currentPage <= 1;
  prevBtn.addEventListener('click', () => reloadFiltered(currentPage - 1));
  container.appendChild(prevBtn);

  const info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = currentPage + ' / ' + totalPages;
  container.appendChild(info);

  const nextBtn = document.createElement('button');
  nextBtn.textContent = 'Suiv.';
  nextBtn.disabled = currentPage >= totalPages;
  nextBtn.addEventListener('click', () => reloadFiltered(currentPage + 1));
  container.appendChild(nextBtn);
}

// ── Generate invoice modal ──────────────────────────────────────────────────
qs('#btn-generate').addEventListener('click', async () => {
  let lookupTimer = null;
  let resolvedOrderId = null;

  const result = await modalForm({
    title: 'Generer une facture',
    confirmText: 'Generer',
    size: 'sm',
    body: `
      <div class="generate-form">
        <div class="form-group">
          <label for="gen-order-number">Numero de commande</label>
          <input type="text" id="gen-order-number" placeholder="Ex : ORD-20260512-XXXX">
        </div>
        <div id="gen-order-preview"></div>
      </div>
    `,
    preConfirm: async () => {
      const orderNumber = qs('#gen-order-number').value.trim();
      if (!orderNumber) {
        Swal.showValidationMessage('Veuillez saisir un numero de commande.');
        return false;
      }
      const res = await apiPost('/admin/invoices/generate', { order_number: orderNumber });
      return res;
    },
  });

  if (result.isConfirmed && result.value) {
    toastSuccess('Facture generee avec succes');
    reloadFiltered(currentPage);
  }
});

// ── Lookup order on input (inside modal) ────────────────────────────────────
document.addEventListener('input', (e) => {
  if (e.target.id !== 'gen-order-number') return;
  const val = e.target.value.trim();
  const preview = qs('#gen-order-preview');
  if (!preview) return;

  if (!val) { preview.innerHTML = ''; return; }

  clearTimeout(window._orderLookupTimer);
  window._orderLookupTimer = setTimeout(async () => {
    try {
      const params = new URLSearchParams({ q: val, per_page: 1 });
      const res = await apiGet('/admin/orders?' + params.toString());
      const orders = res.data || res.orders || res || [];
      if (orders.length) {
        const o = orders[0];
        preview.innerHTML = '<div class="order-preview">'
          + '<strong>' + escape(o.order_number) + '</strong> - '
          + escape(o.email || '') + ' - '
          + formatPrice(o.total_cents)
          + '</div>';
      } else {
        preview.innerHTML = '<div class="order-preview error">Aucune commande trouvee</div>';
      }
    } catch {
      preview.innerHTML = '<div class="order-preview error">Erreur de recherche</div>';
    }
  }, 400);
});

// ── Init ────────────────────────────────────────────────────────────────────
loadInvoices();
</script>
</body>
</html>
