<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Zones de livraison</title>
  <link rel="stylesheet" href="/admin/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/ecommerce.css">
  <link rel="stylesheet" href="/plugin-assets/ecommerce/admin-css/shipping.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="content">
  <div class="page-header">
    <div>
      <h1>Zones de livraison</h1>
      <p class="page-subtitle">Définissez les zones (par pays / codes postaux) et les méthodes de livraison disponibles dans chaque zone.</p>
    </div>
    <div>
      <button class="btn btn-primary" id="zones-add-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nouvelle zone
      </button>
    </div>
  </div>

  <div id="zones-loading" class="card" style="text-align:center;color:var(--gray-500)">Chargement…</div>
  <div id="zones-list" style="display:none"></div>
  <div id="zones-empty" class="card empty" style="display:none">
    <p>Aucune zone configurée. Créez votre première zone pour permettre les livraisons.</p>
  </div>
</div>

<script type="module" src="./shipping/main.js"></script>
</body>
</html>
