<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projets sauvegardés POOLP</title>
<link rel="stylesheet" href="/plugin-assets/poolp-configurator/admin-css/poolp-configurator.css">
</head>
<body>
<div class="poolp-admin">
  <header><h1>Projets sauvegardés</h1></header>
  <table id="list">
    <thead><tr><th>Date</th><th>Email</th><th>Statut</th><th>ERP</th><th>Token</th><th>PDF</th><th></th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const API = '/api';
const token = localStorage.getItem('token') || (window.parent && window.parent.localStorage && window.parent.localStorage.getItem('token'));
const headers = () => ({ 'Authorization': token ? 'Bearer ' + token : '' });
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function load() {
  const res = await fetch(API + '/poolp/admin/projects', { headers: headers() });
  if (!res.ok) { alert('Erreur de chargement (' + res.status + ')'); return; }
  const rows = await res.json();
  document.querySelector('#list tbody').innerHTML = rows.map(r => `
    <tr data-id="${r.id}">
      <td>${esc(r.created_at)}</td>
      <td>${esc(r.customer_email || '—')}</td>
      <td><span class="badge">${esc(r.status)}</span></td>
      <td>${r.is_erp ? '⚠' : '—'}</td>
      <td><a target="_blank" href="/configurateur?p=${esc(r.public_token)}">${esc(r.public_token).slice(0,12)}…</a></td>
      <td>${r.pdf_path ? `<a target="_blank" href="${esc(r.pdf_path)}">PDF</a>` : '—'}</td>
      <td><button class="del">Suppr</button></td>
    </tr>
  `).join('') || '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--p-muted, #6b7280);font-style:italic">Aucun projet sauvegardé</td></tr>';
  document.querySelectorAll('.del').forEach(b => b.addEventListener('click', async e => {
    if (!confirm('Supprimer ce projet ?')) return;
    const id = e.target.closest('tr').dataset.id;
    await fetch(API + '/poolp/admin/projects/' + id, { method: 'DELETE', headers: headers() });
    load();
  }));
}
load();
</script>
</body>
</html>
