<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zones de livraison POOLP</title>
<link rel="stylesheet" href="/plugin-assets/poolp-configurator/admin-css/poolp-configurator.css">
</head>
<body>
<div class="poolp-admin">
  <header><h1>Zones de livraison</h1></header>

  <section>
    <h2>Zones existantes</h2>
    <table id="zones-list">
      <thead><tr><th>Libellé</th><th>Codes postaux</th><th>Délai</th><th>Kit TTC</th><th>Montée TTC</th><th>Active</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Ajouter / modifier une zone</h2>
    <form id="zone-form">
      <input type="hidden" name="id" value="">
      <div class="row">
        <label>Libellé<input name="zone_label" required placeholder="Zone Sud"></label>
        <label>Délai<input name="delay_label" placeholder="5–7 jours ouvrés"></label>
        <label>Ordre<input type="number" name="sort_order" value="0"></label>
        <label class="check"><input type="checkbox" name="is_active" checked> Active</label>
      </div>
      <label>Codes postaux (1 par ligne — exact <code>30000</code>, plage <code>30000-30999</code>, préfixe <code>13*</code>)
        <textarea name="postal_codes" rows="4" placeholder="30000-30999&#10;13*"></textarea>
      </label>
      <div class="row">
        <label>Kit — TTC (€)<input type="number" step="0.01" name="fee_kit_ttc"></label>
        <label>Montée — TTC (€)<input type="number" step="0.01" name="fee_assembled_ttc"></label>
        <label>Kit — Pro HT (€)<input type="number" step="0.01" name="fee_kit_pro_ht"></label>
        <label>Montée — Pro HT (€)<input type="number" step="0.01" name="fee_assembled_pro_ht"></label>
      </div>
      <div class="actions">
        <button type="submit" class="primary">Enregistrer</button>
        <button type="button" id="reset-form">Nouveau</button>
        <span id="form-status"></span>
      </div>
    </form>
  </section>
</div>

<script>
const API = window.parent === window ? '/api' : '/api'; // works inside iframe too
const token = localStorage.getItem('token') || (window.parent && window.parent.localStorage && window.parent.localStorage.getItem('token'));
const headers = () => ({ 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) });

async function loadZones() {
  const res = await fetch(API + '/poolp/admin/zones', { headers: headers() });
  if (!res.ok) { alert('Erreur de chargement (' + res.status + ')'); return; }
  const zones = await res.json();
  const tbody = document.querySelector('#zones-list tbody');
  tbody.innerHTML = zones.map(z => `
    <tr data-id="${z.id}">
      <td>${escapeHtml(z.zone_label)}</td>
      <td><code>${(z.postal_codes || []).map(escapeHtml).join(', ')}</code></td>
      <td>${escapeHtml(z.delay_label || '—')}</td>
      <td>${(z.fee_kit_ttc_cents/100).toFixed(2)} €</td>
      <td>${(z.fee_assembled_ttc_cents/100).toFixed(2)} €</td>
      <td>${z.is_active ? '✓' : '—'}</td>
      <td><button class="edit">Éditer</button> <button class="del">Suppr</button></td>
    </tr>
  `).join('');

  tbody.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', e => {
    const tr = e.target.closest('tr');
    const z = zones.find(z => z.id == tr.dataset.id);
    fillForm(z);
  }));
  tbody.querySelectorAll('.del').forEach(btn => btn.addEventListener('click', async e => {
    if (!confirm('Supprimer cette zone ?')) return;
    const id = e.target.closest('tr').dataset.id;
    await fetch(API + '/poolp/admin/zones/' + id, { method: 'DELETE', headers: headers() });
    loadZones();
  }));
}

function fillForm(z) {
  const f = document.getElementById('zone-form');
  f.id.value = z.id;
  f.zone_label.value = z.zone_label;
  f.delay_label.value = z.delay_label || '';
  f.sort_order.value = z.sort_order || 0;
  f.is_active.checked = !!z.is_active;
  f.postal_codes.value = (z.postal_codes || []).join('\n');
  f.fee_kit_ttc.value = (z.fee_kit_ttc_cents / 100) || '';
  f.fee_assembled_ttc.value = (z.fee_assembled_ttc_cents / 100) || '';
  f.fee_kit_pro_ht.value = (z.fee_kit_pro_ht_cents / 100) || '';
  f.fee_assembled_pro_ht.value = (z.fee_assembled_pro_ht_cents / 100) || '';
  document.getElementById('form-status').textContent = 'Mode édition #' + z.id;
}

document.getElementById('zone-form').addEventListener('submit', async e => {
  e.preventDefault();
  const f = e.target;
  const id = f.id.value;
  const payload = {
    zone_label: f.zone_label.value,
    delay_label: f.delay_label.value,
    sort_order: parseInt(f.sort_order.value, 10) || 0,
    is_active: f.is_active.checked,
    postal_codes: f.postal_codes.value.split('\n').map(s => s.trim()).filter(Boolean),
    fee_kit_ttc: parseFloat(f.fee_kit_ttc.value) || 0,
    fee_assembled_ttc: parseFloat(f.fee_assembled_ttc.value) || 0,
    fee_kit_pro_ht: parseFloat(f.fee_kit_pro_ht.value) || 0,
    fee_assembled_pro_ht: parseFloat(f.fee_assembled_pro_ht.value) || 0,
  };
  const url = id ? API + '/poolp/admin/zones/' + id : API + '/poolp/admin/zones';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: headers(), body: JSON.stringify(payload) });
  if (!res.ok) { alert('Erreur (' + res.status + ')'); return; }
  document.getElementById('form-status').textContent = 'Enregistré';
  f.reset();
  f.id.value = '';
  loadZones();
});

document.getElementById('reset-form').addEventListener('click', () => {
  const f = document.getElementById('zone-form');
  f.reset();
  f.id.value = '';
  document.getElementById('form-status').textContent = '';
});

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadZones();
</script>
</body>
</html>
