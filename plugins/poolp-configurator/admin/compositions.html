<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compositions packs POOLP</title>
<link rel="stylesheet" href="/plugin-assets/poolp-configurator/admin-css/poolp-configurator.css">
</head>
<body>
<div class="poolp-admin">
  <header>
    <h1>Compositions packs</h1>
  </header>

  <table id="list">
    <thead><tr><th>Box</th><th>Filtre</th><th>Pompe</th><th>Filtre eq.</th><th>Pompe eq.</th><th>Coffret prog.</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const API = '/api';
const token = localStorage.getItem('token') || (window.parent && window.parent.localStorage && window.parent.localStorage.getItem('token'));
const headers = () => ({ 'Authorization': token ? 'Bearer ' + token : '' });
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function load() {
  const [comps, eqs] = await Promise.all([
    fetch(API + '/cpt/poolp_compositions', { headers: headers() }).then(r => r.json()),
    fetch(API + '/cpt/poolp_equipments', { headers: headers() }).then(r => r.json()),
  ]);
  const eqMap = new Map((eqs.items || eqs).map(e => [e.id, e.title]));
  const rows = comps.items || comps;
  document.querySelector('#list tbody').innerHTML = rows.map(r => {
    const cf = r.custom_fields || {};
    return `
      <tr>
        <td><strong>${esc(cf.box_code)}</strong></td>
        <td>${esc(cf.filtre_type)}</td>
        <td>${esc(cf.pompe_type)}</td>
        <td>${esc(eqMap.get(parseInt(cf.filtre_equipment_id, 10)) || '—')}</td>
        <td>${esc(eqMap.get(parseInt(cf.pompe_equipment_id, 10)) || '—')}</td>
        <td>${esc(eqMap.get(parseInt(cf.coffret_programmation_equipment_id, 10)) || '— (auto)')}</td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--p-muted, #6b7280);font-style:italic">Aucune composition définie</td></tr>';
}
load();
</script>
</body>
</html>
